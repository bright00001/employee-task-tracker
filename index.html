<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>员工每日任务完成记录</title>
<style>
  :root {
    --bg: #f5f6fa;
    --card: #fff;
    --primary: #4f6ef7;
    --success: #22c55e;
    --danger: #ef4444;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .app { max-width:1100px; margin:0 auto; padding:20px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
  }
  .header h1 {
    font-size: 1.5rem; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .header h1 .icon { font-size:1.6rem; }
  .header-right { display:flex; align-items:center; gap:12px; }

  /* Employee selector */
  .emp-selector {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); padding: 6px 12px;
    border-radius: 8px; border: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .emp-selector label { font-size:.85rem; color: var(--text-secondary); white-space:nowrap; }
  .emp-selector select {
    border: none; outline: none; font-size:.9rem; padding:4px 8px;
    background: transparent; cursor: pointer; min-width:100px;
  }
  .btn-sm {
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--card); cursor: pointer; font-size:.8rem;
    transition: all .15s;
  }
  .btn-sm:hover { background: #f1f5f9; }

  /* Date bar */
  .date-bar {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    background: var(--card); padding: 10px 16px;
    border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow);
  }
  .date-bar .date-label { font-weight:600; font-size:1rem; }
  .date-bar .date-nav { display:flex; gap:6px; margin-left:auto; }
  .date-bar button {
    padding:4px 12px; border:1px solid var(--border); border-radius:6px;
    background:var(--card); cursor:pointer; font-size:.85rem; transition:all .15s;
  }
  .date-bar button:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
  .date-bar button:disabled { opacity:.4; cursor:not-allowed; }

  /* Tabs */
  .tabs {
    display: flex; gap: 2px; margin-bottom: 0;
    background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid var(--border); border-bottom: none; overflow: hidden;
  }
  .tab {
    padding: 10px 20px; cursor: pointer; font-size:.9rem; font-weight:500;
    color: var(--text-secondary); border-bottom: 2px solid transparent;
    transition: all .15s; background: transparent; border-top: none; border-left: none; border-right: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 0 0 var(--radius) var(--radius); box-shadow: var(--shadow);
    padding: 20px;
  }

  /* Task table */
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  th { text-align:left; padding:10px 12px; color:var(--text-secondary); font-weight:600; font-size:.8rem; text-transform:uppercase; border-bottom:2px solid var(--border); }
  td { padding:10px 12px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  tr.completed { background:#f0fdf4; }
  tr.completed td { color:var(--text-secondary); }

  /* Custom checkbox */
  .cb-wrap { display:flex; align-items:center; justify-content:center; }
  .cb-wrap input[type="checkbox"] {
    width:22px; height:22px; cursor:pointer; accent-color:var(--success);
  }

  .score-badge {
    display:inline-block; padding:2px 10px; border-radius:12px;
    background:#eef2ff; color:var(--primary); font-weight:600; font-size:.85rem;
  }
  .earned-badge {
    display:inline-block; padding:2px 10px; border-radius:12px;
    background:#dcfce7; color:#16a34a; font-weight:600; font-size:.85rem;
    min-width:40px; text-align:center;
  }

  /* Summary row */
  .summary-row td {
    font-weight:700; border-top:2px solid var(--border);
    background:#f8fafc; font-size:.95rem;
  }
  .summary-total { color:var(--primary); font-size:1.1rem; }

  /* Dashboard */
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px 20px; box-shadow:var(--shadow); text-align:center;
  }
  .stat-card .label { font-size:.8rem; color:var(--text-secondary); margin-bottom:4px; }
  .stat-card .value { font-size:2rem; font-weight:700; color:var(--primary); }
  .stat-card .sub { font-size:.75rem; color:var(--text-secondary); margin-top:2px; }

  .history-list { max-height:400px; overflow-y:auto; }
  .history-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 14px; border-bottom:1px solid var(--border);
  }
  .history-item:last-child { border-bottom:none; }
  .history-date { font-weight:500; }
  .history-score { font-weight:700; color:var(--primary); }

  /* Task management */
  .task-mgmt-form {
    display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:flex-end;
  }
  .task-mgmt-form input {
    padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:.9rem;
  }
  .task-mgmt-form input[type="text"] { flex:2; min-width:200px; }
  .task-mgmt-form input[type="number"] { width:80px; text-align:center; }

  .btn {
    padding:8px 16px; border:none; border-radius:6px; cursor:pointer;
    font-size:.85rem; font-weight:500; transition:all .15s;
  }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-primary:hover { opacity:.9; }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-danger:hover { opacity:.9; }
  .btn-outline { background:transparent; border:1px solid var(--border); }
  .btn-outline:hover { background:#f1f5f9; }

  .task-mgmt-list .task-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; border-bottom:1px solid var(--border);
  }
  .task-mgmt-list .task-item:last-child { border-bottom:none; }

  /* Modal */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
    z-index:100; justify-content:center; align-items:center;
  }
  .modal-overlay.show { display:flex; }
  .modal {
    background:var(--card); border-radius:var(--radius); padding:24px;
    min-width:360px; max-width:90vw; box-shadow:0 4px 20px rgba(0,0,0,.15);
  }
  .modal h3 { margin-bottom:16px; }
  .modal .actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }

  /* Toast */
  .toast {
    position:fixed; top:20px; right:20px; z-index:200;
    background:var(--success); color:#fff; padding:10px 20px;
    border-radius:8px; font-size:.9rem; box-shadow:0 4px 12px rgba(0,0,0,.15);
    transform:translateX(120%); transition:transform .3s;
  }
  .toast.show { transform:translateX(0); }

  /* Dark badge for header */
  .reset-info {
    font-size:.75rem; color:var(--text-secondary); background:#f1f5f9;
    padding:3px 10px; border-radius:12px;
  }

  @media (max-width:640px) {
    .header { flex-direction:column; align-items:flex-start; }
    .header-right { width:100%; justify-content:space-between; }
    .dash-grid { grid-template-columns:1fr 1fr; }
    .task-mgmt-form { flex-direction:column; }
    .task-mgmt-form input[type="text"] { width:100%; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1><span class="icon">📋</span>员工每日任务完成记录</h1>
    <div class="header-right">
      <span class="reset-info">🕛 每晚 00:00 自动复位</span>
      <div class="emp-selector">
        <label>👤 员工:</label>
        <select id="employeeSelect"></select>
        <button class="btn-sm" onclick="showEmpModal()" title="管理员工">＋</button>
      </div>
    </div>
  </div>

  <!-- Date bar -->
  <div class="date-bar">
    <span class="date-label" id="dateLabel"></span>
    <div class="date-nav">
      <button onclick="navDate(-1)">◀ 前一天</button>
      <button onclick="navDate(0)">📅 今天</button>
      <button onclick="navDate(1)">后一天 ▶</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('checkin')">✅ 今日打卡</button>
    <button class="tab" onclick="switchTab('history')">📊 历史记录</button>
    <button class="tab" onclick="switchTab('dashboard')">📈 看板</button>
    <button class="tab" onclick="switchTab('tasks')">⚙️ 任务管理</button>
  </div>

  <!-- Card container -->
  <div class="card" id="cardContent"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

<!-- Employee modal -->
<div class="modal-overlay" id="empModal">
  <div class="modal">
    <h3>👥 员工管理</h3>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <input type="text" id="newEmpName" placeholder="输入员工姓名" style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.9rem;">
      <button class="btn btn-primary" onclick="addEmployee()">添加</button>
    </div>
    <div id="empList" style="max-height:200px;overflow-y:auto;"></div>
    <div class="actions">
      <button class="btn btn-outline" onclick="closeEmpModal()">关闭</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA MODEL ====================
const STORAGE_KEY = 'etask_data_v2';
const TODAY = () => new Date().toISOString().slice(0,10);

let appData = {
  employees: ['张三', '李四'],
  currentEmployee: '张三',
  // tasks: { employeeName: [{id, name, score}] }
  tasks: {},
  // records: { employeeName: { '2026-05-24': {taskId: true/false} } }
  records: {},
  viewingDate: TODAY(),
  lastResetDate: TODAY()
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      appData = { ...appData, ...saved };
    }
  } catch(e) { console.warn('数据加载失败', e); }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); } catch(e) {}
}

// Initialize default tasks
function ensureDefaults() {
  appData.employees.forEach(emp => {
    if (!appData.tasks[emp]) {
      appData.tasks[emp] = [
        { id:'t1', name:'完成日报', score:5 },
        { id:'t2', name:'处理客户需求', score:10 },
        { id:'t3', name:'代码开发与测试', score:15 },
        { id:'t4', name:'会议参与', score:5 },
        { id:'t5', name:'文档编写', score:8 },
      ];
    }
    if (!appData.records[emp]) appData.records[emp] = {};
  });
  // Ensure current employee exists
  if (!appData.employees.includes(appData.currentEmployee)) {
    appData.currentEmployee = appData.employees[0] || '张三';
  }
}

// ==================== RENDER ====================
let currentTab = 'checkin';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes(tab === 'checkin' ? '打卡' : tab === 'history' ? '历史' : tab === 'dashboard' ? '看板' : '管理')) {
      t.classList.add('active');
    }
  });
  render();
}

function render() {
  const emp = appData.currentEmployee;
  const tasks = appData.tasks[emp] || [];
  const date = appData.viewingDate;
  const dayRecords = (appData.records[emp] || {})[date] || {};
  const isToday = date === TODAY();

  // Update header
  document.getElementById('employeeSelect').innerHTML = appData.employees.map(e =>
    `<option value="${e}" ${e===emp?'selected':''}>${e}</option>`
  ).join('');
  document.getElementById('dateLabel').textContent = `📆 ${date} ${isToday ? '(今天)' : ''}`;

  const container = document.getElementById('cardContent');

  switch(currentTab) {
    case 'checkin': renderCheckin(container, tasks, dayRecords, date, isToday); break;
    case 'history': renderHistory(container, emp); break;
    case 'dashboard': renderDashboard(container, emp); break;
    case 'tasks': renderTaskMgmt(container, emp, tasks); break;
  }
}

function renderCheckin(container, tasks, dayRecords, date, isToday) {
  if (tasks.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:40px;">暂无任务，请先在「任务管理」中添加</p>';
    return;
  }
  const totalScore = tasks.reduce((s,t) => s + t.score, 0);
  const earned = tasks.reduce((s,t) => s + (dayRecords[t.id] ? t.score : 0), 0);
  const completed = tasks.filter(t => dayRecords[t.id]).length;

  let html = `<table>
    <thead><tr>
      <th style="width:50px;">序号</th>
      <th>任务名称</th>
      <th style="width:80px;text-align:center;">分值</th>
      <th style="width:80px;text-align:center;">完成</th>
      <th style="width:80px;text-align:center;">得分</th>
    </tr></thead><tbody>`;

  tasks.forEach((t, i) => {
    const done = !!dayRecords[t.id];
    const rowClass = done ? 'completed' : '';
    html += `<tr class="${rowClass}">
      <td>${i+1}</td>
      <td>${done ? '<s>' + esc(t.name) + '</s>' : esc(t.name)}</td>
      <td style="text-align:center;"><span class="score-badge">${t.score}</span></td>
      <td style="text-align:center;">
        <div class="cb-wrap">
          <input type="checkbox" ${done?'checked':''} ${isToday?'':'disabled'}
                 onchange="toggleTask('${t.id}', this.checked)">
        </div>
      </td>
      <td style="text-align:center;"><span class="earned-badge">${done ? t.score : 0}</span></td>
    </tr>`;
  });

  html += `<tr class="summary-row">
    <td colspan="2">📊 汇总</td>
    <td style="text-align:center;">${totalScore}</td>
    <td style="text-align:center;">${completed}/${tasks.length}</td>
    <td style="text-align:center;"><span class="summary-total">${earned}</span></td>
  </tr></tbody></table>`;

  if (!isToday) {
    html += '<p style="margin-top:12px;font-size:.8rem;color:var(--text-secondary);text-align:center;">⚠️ 非当日不可修改，仅查看历史记录</p>';
  } else {
    html += `<p style="margin-top:12px;font-size:.8rem;color:var(--text-secondary);text-align:center;">
      今日得分: <strong style="color:var(--primary);">${earned}</strong> / ${totalScore} · 完成率: <strong>${totalScore>0 ? Math.round(earned/totalScore*100) : 0}%</strong>
    </p>`;
  }

  container.innerHTML = html;
}

function renderHistory(container, emp) {
  const records = appData.records[emp] || {};
  const tasks = appData.tasks[emp] || [];
  const totalPerTask = tasks.reduce((s,t) => s + t.score, 0);

  const dates = Object.keys(records).sort().reverse();
  if (dates.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-secondary);padding:40px;">暂无历史记录</p>';
    return;
  }

  let html = '<div class="history-list">';
  dates.forEach(date => {
    const dayRec = records[date] || {};
    const earned = tasks.reduce((s,t) => s + (dayRec[t.id] ? t.score : 0), 0);
    const completed = tasks.filter(t => dayRec[t.id]).length;
    const pct = totalPerTask > 0 ? Math.round(earned / totalPerTask * 100) : 0;
    html += `<div class="history-item" style="cursor:pointer;" onclick="appData.viewingDate='${date}';switchTab('checkin');">
      <span class="history-date">📅 ${date}</span>
      <span>完成 ${completed}/${tasks.length} 项</span>
      <span>完成率 ${pct}%</span>
      <span class="history-score">${earned} 分</span>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function renderDashboard(container, emp) {
  const records = appData.records[emp] || {};
  const tasks = appData.tasks[emp] || [];
  const totalPerTask = tasks.reduce((s,t) => s + t.score, 0);

  const dates = Object.keys(records).sort();
  const today = TODAY();
  const todayRec = records[today] || {};
  const todayEarned = tasks.reduce((s,t) => s + (todayRec[t.id] ? t.score : 0), 0);
  const todayCompleted = tasks.filter(t => todayRec[t.id]).length;

  // This week (Mon-Sun)
  const now = new Date();
  const dayOfWeek = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  let weekEarned = 0; let weekDays = 0;
  for (let d = new Date(monday); d <= now; d.setDate(d.getDate()+1)) {
    const ds = d.toISOString().slice(0,10);
    const rec = records[ds] || {};
    weekEarned += tasks.reduce((s,t) => s + (rec[t.id] ? t.score : 0), 0);
    if (records[ds]) weekDays++;
  }

  // This month
  const monthStart = today.slice(0,7) + '-01';
  let monthEarned = 0; let monthDays = 0;
  dates.forEach(d => {
    if (d.startsWith(today.slice(0,7))) {
      const rec = records[d] || {};
      monthEarned += tasks.reduce((s,t) => s + (rec[t.id] ? t.score : 0), 0);
      monthDays++;
    }
  });

  // Total
  let totalEarned = 0; let totalDays = dates.length;
  dates.forEach(d => {
    const rec = records[d] || {};
    totalEarned += tasks.reduce((s,t) => s + (rec[t.id] ? t.score : 0), 0);
  });

  const avgDaily = totalDays > 0 ? Math.round(totalEarned / totalDays) : 0;

  let html = `<div class="dash-grid">
    <div class="stat-card">
      <div class="label">📋 今日得分</div>
      <div class="value">${todayEarned}</div>
      <div class="sub">完成 ${todayCompleted}/${tasks.length} 项</div>
    </div>
    <div class="stat-card">
      <div class="label">📅 本周得分</div>
      <div class="value">${weekEarned}</div>
      <div class="sub">${weekDays} 天有记录</div>
    </div>
    <div class="stat-card">
      <div class="label">🗓️ 本月得分</div>
      <div class="value">${monthEarned}</div>
      <div class="sub">${monthDays} 天有记录</div>
    </div>
    <div class="stat-card">
      <div class="label">🏆 总得分</div>
      <div class="value">${totalEarned}</div>
      <div class="sub">日均 ${avgDaily} 分 · ${totalDays} 天</div>
    </div>
  </div>`;

  // Task completion rates
  if (tasks.length > 0) {
    html += '<h4 style="margin-bottom:12px;">📊 各任务完成统计</h4><table><thead><tr><th>任务</th><th style="text-align:center;">分值</th><th style="text-align:center;">完成次数</th><th style="text-align:center;">累计得分</th><th style="text-align:center;">完成率</th></tr></thead><tbody>';
    tasks.forEach(t => {
      let count = 0; let score = 0;
      dates.forEach(d => {
        const rec = records[d] || {};
        if (rec[t.id]) { count++; score += t.score; }
      });
      const pct = totalDays > 0 ? Math.round(count / totalDays * 100) : 0;
      html += `<tr>
        <td>${esc(t.name)}</td>
        <td style="text-align:center;"><span class="score-badge">${t.score}</span></td>
        <td style="text-align:center;">${count} 次</td>
        <td style="text-align:center;"><span class="earned-badge">${score}</span></td>
        <td style="text-align:center;">${pct}%</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }

  // Weekly trend (simple bar)
  if (dates.length > 0) {
    html += '<h4 style="margin:20px 0 12px;">📈 近7天趋势</h4><div style="display:flex;gap:4px;align-items:flex-end;height:120px;padding:0 8px;">';
    for (let i = 6; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0,10);
      const rec = records[ds] || {};
      const earned = tasks.reduce((s,t) => s + (rec[t.id] ? t.score : 0), 0);
      const pct = totalPerTask > 0 ? Math.round(earned / totalPerTask * 100) : 0;
      const height = totalPerTask > 0 ? Math.max(4, Math.round(earned / totalPerTask * 100)) : 4;
      const isTodayBar = ds === today;
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
        <span style="font-size:.7rem;font-weight:600;color:${isTodayBar?'var(--primary)':'var(--text-secondary)'};">${earned}</span>
        <div style="width:100%;max-width:40px;height:${height}px;background:${isTodayBar?'var(--primary)':'#cbd5e1'};border-radius:4px 4px 0 0;transition:height .3s;" title="${ds}: ${earned}分"></div>
        <span style="font-size:.65rem;color:var(--text-secondary);">${ds.slice(5)}</span>
      </div>`;
    }
    html += '</div>';
  }

  container.innerHTML = html;
}

function renderTaskMgmt(container, emp, tasks) {
  let html = `
    <div class="task-mgmt-form">
      <input type="text" id="newTaskName" placeholder="输入任务名称" maxlength="50">
      <input type="number" id="newTaskScore" placeholder="分值" min="1" max="100" value="5">
      <button class="btn btn-primary" onclick="addTask()">＋ 添加任务</button>
    </div>
    <p style="font-size:.8rem;color:var(--text-secondary);margin-bottom:12px;">
      💡 添加后会同步到所有员工的模板中。要修改现有任务，请先删除再重新添加。
    </p>
    <div class="task-mgmt-list">`;

  if (tasks.length === 0) {
    html += '<p style="text-align:center;color:var(--text-secondary);padding:20px;">暂无任务</p>';
  } else {
    tasks.forEach(t => {
      html += `<div class="task-item">
        <span>📌 ${esc(t.name)} — <span class="score-badge">${t.score} 分</span></span>
        <button class="btn btn-danger" style="padding:3px 10px;font-size:.75rem;" onclick="deleteTask('${t.id}')">删除</button>
      </div>`;
    });
  }

  html += '</div>';

  // Quick restore
  html += `<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
    <p style="font-size:.8rem;color:var(--text-secondary);margin-bottom:8px;">🔧 工具:</p>
    <button class="btn btn-outline btn-sm" onclick="resetToday()">🔄 重置今日打卡</button>
    <button class="btn btn-outline btn-sm" onclick="exportData()" style="margin-left:8px;">📥 导出数据</button>
    <button class="btn btn-outline btn-sm" onclick="importDataPrompt()" style="margin-left:8px;">📤 导入数据</button>
  </div>`;

  container.innerHTML = html;
}

// ==================== ACTIONS ====================
function toggleTask(taskId, checked) {
  const emp = appData.currentEmployee;
  const date = appData.viewingDate;
  if (date !== TODAY()) return;

  if (!appData.records[emp]) appData.records[emp] = {};
  if (!appData.records[emp][date]) appData.records[emp][date] = {};

  appData.records[emp][date][taskId] = checked;
  saveData();
  render();
}

function addTask() {
  const nameEl = document.getElementById('newTaskName');
  const scoreEl = document.getElementById('newTaskScore');
  const name = nameEl.value.trim();
  const score = parseInt(scoreEl.value) || 5;
  if (!name) { showToast('请输入任务名称'); return; }

  const emp = appData.currentEmployee;
  const tasks = appData.tasks[emp] || [];
  tasks.push({ id: 't' + Date.now(), name, score: Math.max(1, Math.min(100, score)) });
  appData.tasks[emp] = tasks;
  saveData();
  nameEl.value = '';
  scoreEl.value = '5';
  render();
  showToast('✅ 任务已添加');
}

function deleteTask(taskId) {
  const emp = appData.currentEmployee;
  if (!confirm('确定删除该任务吗？这将同时清除所有员工的该任务历史记录。')) return;

  // Remove from all employees
  Object.keys(appData.tasks).forEach(e => {
    appData.tasks[e] = (appData.tasks[e] || []).filter(t => t.id !== taskId);
  });
  // Clean records
  Object.keys(appData.records).forEach(e => {
    Object.keys(appData.records[e] || {}).forEach(d => {
      delete appData.records[e][d][taskId];
    });
  });
  saveData();
  render();
  showToast('🗑️ 任务已删除');
}

function navDate(offset) {
  if (offset === 0) {
    appData.viewingDate = TODAY();
  } else {
    const d = new Date(appData.viewingDate);
    d.setDate(d.getDate() + offset);
    appData.viewingDate = d.toISOString().slice(0,10);
  }
  render();
}

// ==================== EMPLOYEE MANAGEMENT ====================
function showEmpModal() {
  document.getElementById('empModal').classList.add('show');
  renderEmpList();
}
function closeEmpModal() {
  document.getElementById('empModal').classList.remove('show');
}
function renderEmpList() {
  const list = document.getElementById('empList');
  list.innerHTML = appData.employees.map(e => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);">
      <span>👤 ${esc(e)}</span>
      <button class="btn btn-danger" style="padding:2px 8px;font-size:.7rem;" onclick="removeEmployee('${e}')">删除</button>
    </div>
  `).join('');
}
function addEmployee() {
  const name = document.getElementById('newEmpName').value.trim();
  if (!name) { showToast('请输入姓名'); return; }
  if (appData.employees.includes(name)) { showToast('该员工已存在'); return; }
  appData.employees.push(name);
  appData.currentEmployee = name;
  ensureDefaults();
  saveData();
  document.getElementById('newEmpName').value = '';
  renderEmpList();
  closeEmpModal();
  render();
  showToast('✅ 员工已添加');
}
function removeEmployee(name) {
  if (appData.employees.length <= 1) { showToast('至少保留一个员工'); return; }
  if (!confirm(`确定删除员工「${name}」及其所有数据吗？`)) return;
  appData.employees = appData.employees.filter(e => e !== name);
  delete appData.tasks[name];
  delete appData.records[name];
  if (appData.currentEmployee === name) appData.currentEmployee = appData.employees[0];
  saveData();
  renderEmpList();
  closeEmpModal();
  render();
  showToast('🗑️ 员工已删除');
}
document.getElementById('employeeSelect').addEventListener('change', function() {
  appData.currentEmployee = this.value;
  saveData();
  render();
});

// ==================== TOOLS ====================
function resetToday() {
  if (!confirm('确定重置今日所有打卡记录吗？')) return;
  const emp = appData.currentEmployee;
  const today = TODAY();
  if (appData.records[emp]) appData.records[emp][today] = {};
  saveData();
  render();
  showToast('🔄 今日打卡已重置');
}

function exportData() {
  const blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `task-records-${TODAY()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📥 数据已导出');
}

function importDataPrompt() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.employees || !data.tasks) throw new Error('格式错误');
        if (!confirm(`即将导入数据（含 ${data.employees.length} 名员工），当前数据将被覆盖，确定？`)) return;
        appData = data;
        saveData();
        render();
        showToast('📤 数据已导入');
      } catch(err) { showToast('❌ 导入失败：文件格式不正确'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ==================== AUTO RESET ====================
function checkMidnightReset() {
  const today = TODAY();
  if (appData.lastResetDate !== today) {
    // New day — clear checkboxes for today
    appData.lastResetDate = today;
    // Initialize blank record for today (just to create the date entry)
    // Don't clear old data, just ensure today starts fresh
    appData.employees.forEach(emp => {
      if (!appData.records[emp]) appData.records[emp] = {};
      // Only clear if today's record has any data from previous session race condition
      // Actually we don't want to clear here - the absence of record = all unchecked
      // But we should not delete the record either, because the day might have data
    });
    saveData();
    // If viewing today, refresh
    if (appData.viewingDate === today) {
      render();
    }
  }
}

// Check every 30 seconds
setInterval(checkMidnightReset, 30000);
checkMidnightReset();

// ==================== UTILS ====================
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

// ==================== INIT ====================
loadData();
ensureDefaults();
render();
</script>
